name: Code Styling

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    format:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 20

            - name: Install dependencies
              run: npm ci --ignore-scripts

            - name: Prettier
              run: npx prettier --check .

            - name: ESLint
              run: npm run lint
